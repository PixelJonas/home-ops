default:
  app:
    enabled: true
    enableAutoSync: true
    autoSyncPrune: true
    project: cluster-config
    labels:
      app-source: sakaar
      repo: cluster-config
    destination:
      namespace: openshift-gitops
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/pixeljonas/home-ops.git
      targetRevision: HEAD

applications:
  external-secrets-doppler:
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    destination:
      namespace: external-secrets-operator
    source:
      path: components-infra/external-secrets-store-doppler/overlays/sakaar

  cert-manager-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    destination:
      namespace: cert-manager-operator
    source:
      path: components-infra/cert-manager-operator/aggregate/overlays/letsencrypt

  certificates:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: cert-manager-operator
    source:
      path: components-infra/certificates/overlays/sakaar

  volsync:
    annotations:
      argocd.argoproj.io/sync-wave: "22"
      argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    source:
      path: components-infra/volsync

  restic-rest-server:
    annotations:
      argocd.argoproj.io/sync-wave: "22"
    destination:
      namespace: restic-rest
    source:
      path: components-infra/restic-rest-server/overlays/sakaar

  claude-admin:
    annotations:
      argocd.argoproj.io/sync-wave: "11"
    source:
      path: components-infra/claude-admin/base

  rbac:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
      argocd.argoproj.io/sync-wave: "11"
    source:
      path: components-infra/rbac/base

  openshift-oauth-htpasswd:
    annotations:
      argocd.argoproj.io/sync-wave: "3"
    destination:
      namespace: openshift-config
    source:
      path: components-infra/openshift-oauth-htpasswd/overlays/sakaar

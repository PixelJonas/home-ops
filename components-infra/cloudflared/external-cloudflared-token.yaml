apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-cloudflared-token
  namespace: cloudflared
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: cloudflared-token
  data:
    - secretKey: token
      remoteRef:
        key: CF_TUNNEL_K8S_TOKEN

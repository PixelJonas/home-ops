apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: caldiy-db-secret
  namespace: caldiy
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: caldiy-db-secret
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: "caldiy"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: CALDIY_POSTGRES_USER_PASSWORD

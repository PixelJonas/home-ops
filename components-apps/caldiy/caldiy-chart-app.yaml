apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caldiy-app
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "111"
spec:
  destination:
    namespace: caldiy
    server: "https://kubernetes.default.svc"
  source:
    chart: app-template
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.6.2
    helm:
      values: |-

        defaultPodOptions:
          securityContext:
            runAsUser: 0
            runAsGroup: 0

        controllers:
          caldiy:
            containers:
              caldiy:
                image:
                  repository: docker.io/calcom/cal.com
                  tag: latest # renovate: ignore
                  pullPolicy: Always
                env:
                  TZ: Europe/Berlin
                  NODE_ENV: production
                  NEXT_PUBLIC_WEBAPP_URL: "https://cal.janz.digital"
                  NEXTAUTH_URL: "https://cal.janz.digital"
                  NEXT_PUBLIC_WEBSITE_URL: "https://cal.janz.digital"
                  EMAIL_FROM_NAME: "Cal.diy"
                  # Disable telemetry
                  NEXT_TELEMETRY_DISABLED: "1"
                  ALLOWED_HOSTNAMES: '["cal.janz.digital","cal.apps.altus.janz.digital","caldiy-app-caldiy.caldiy.svc.cluster.local","localhost"]'
                envFrom:
                  - secretRef:
                      name: caldiy-app-secret
                probes:
                  startup:
                    custom: true
                    enabled: true
                    spec:
                      failureThreshold: 60
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      httpGet:
                        path: /api/health
                        port: 3000
                  liveness:
                    custom: true
                    enabled: true
                    spec:
                      failureThreshold: 5
                      periodSeconds: 30
                      httpGet:
                        path: /api/health
                        port: 3000

        service:
          caldiy:
            controller: caldiy
            ports:
              http:
                port: 3000

        ingress:
          caldiy:
            enabled: true
            className: openshift-default
            annotations:
              route.openshift.io/termination: "edge"
            hosts:
              - host: cal.apps.altus.janz.digital
                paths:
                  - path: /
                    service:
                      identifier: caldiy
                      port: http
              - host: cal.janz.digital
                paths:
                  - path: /
                    service:
                      identifier: caldiy
                      port: http

  project: cluster-apps
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

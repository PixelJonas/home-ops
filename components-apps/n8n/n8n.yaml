apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "111"
  name: n8n-app
  namespace: openshift-gitops
spec:
  destination:
    namespace: n8n
    server: "https://kubernetes.default.svc"
  source:
    chart: app-template
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.6.2
    helm:
      values: |-
        
        defaultPodOptions:
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 172.30.0.10
            searches:
              - svc.cluster.local
              - cluster.local
              - altus.janz.digital
              - janz.lan
              - janz.digital

        controllers:
          ollama:
            containers:
              ollama:
                resources:
                  limits:
                    nvidia.com/gpu: 1
                image:
                  repository: docker.io/ollama/ollama
                  tag: 0.21.2
                  pullPolicy: IfNotPresent
                env:
                  TZ: Europe/Berlin
                  OLLAMA_HOST: "0.0.0.0:11434"
                  OLLAMA_FLASH_ATTENTION: "1"
                  OLLAMA_KEEP_ALIVE: "-1"
                  OLLAMA_NUM_PARALLEL: "2"


          bm25-embed:
            containers:
              bm25-embed:
                image:
                  repository: docker.io/library/python
                  tag: 3.12-slim
                  pullPolicy: IfNotPresent
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    set -eu
                    export HOME=/cache
                    export PYTHONUSERBASE=/cache/pyuser
                    export PIP_CACHE_DIR=/cache/pip
                    export PATH=$PYTHONUSERBASE/bin:$PATH
                    export FASTEMBED_CACHE_PATH=/cache/fastembed
                    mkdir -p "$PYTHONUSERBASE" "$PIP_CACHE_DIR" "$FASTEMBED_CACHE_PATH"
                    pip install --user --quiet --disable-pip-version-check \
                      'fastapi==0.115.*' \
                      'uvicorn[standard]==0.32.*' \
                      'fastembed==0.8.*'
                    exec python -m uvicorn app:app \
                      --host 0.0.0.0 --port 8000 \
                      --app-dir /app
                env:
                  TZ: Europe/Berlin
                  PYTHONUNBUFFERED: "1"
                resources:
                  requests:
                    cpu: 100m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 5
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      failureThreshold: 30
                      periodSeconds: 10

          presidio-api:
            containers:
              presidio-api:
                image:
                  repository: docker.io/library/python
                  tag: 3.14.4
                  pullPolicy: IfNotPresent
                command:
                  - /bin/sh
                  - -c
                args:
                  - |
                    set -eu
                    export HOME=/cache
                    export PYTHONUSERBASE=/cache/pyuser
                    export PIP_CACHE_DIR=/cache/pip
                    export PATH=$PYTHONUSERBASE/bin:$PATH
                    mkdir -p "$PYTHONUSERBASE" "$PIP_CACHE_DIR"
                    pip install --user --quiet --disable-pip-version-check \
                      'fastapi==0.115.*' \
                      'uvicorn[standard]==0.32.*' \
                      'presidio-analyzer==2.2.*' \
                      'presidio-anonymizer==2.2.*' \
                      'spacy==3.8.*'
                    python -m spacy download en_core_web_md 2>/dev/null || true
                    python -m spacy download de_core_news_md 2>/dev/null || true
                    exec python -m uvicorn app:app \
                      --host 0.0.0.0 --port 8000 \
                      --app-dir /app
                env:
                  TZ: Europe/Berlin
                  PRESIDIO_SCORE_THRESHOLD: "0.7"
                  PRESIDIO_MIN_ENTITY_LENGTH: "4"
                  PRESIDIO_DENYLIST: "re,cap,von,cc,an,vg,hi,ok,tel,mail,info,gmbh,bcc,fwd,aw,betreff,datum,sitz,best regards,moin,montag,dienstag,mittwoch,donnerstag,freitag,samstag,sonntag,openshift,lego"
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 20
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /healthz
                        port: 8000
                      failureThreshold: 40
                      periodSeconds: 10

          unifi-mcp:
            containers:
              unifi-mcp:
                image:
                  repository: ghcr.io/sirkirby/unifi-network-mcp
                  tag: 0.14.8
                  pullPolicy: IfNotPresent
                env:
                  TZ: Europe/Berlin
                  UNIFI_PORT: 443
                  UNIFI_SITE: default
                  UNIFI_VERIFY_SSL: false
                  UNIFI_MCP_HTTP_ENABLED: true
                  UNIFI_HOST:
                    valueFrom:
                      secretKeyRef:
                        name: unifi-mcp-credentials
                        key: host
                  UNIFI_USERNAME:
                    valueFrom:
                      secretKeyRef:
                        name: unifi-mcp-credentials
                        key: username
                  UNIFI_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: unifi-mcp-credentials
                        key: password
          paperless-mcp:
            containers:
              paperless-mcp:
                image:
                  repository: ghcr.io/baruchiro/paperless-mcp
                  tag: latest
                env:
                  TZ: Europe/Berlin
                  PAPERLESS_URL: https://paperless.apps.altus.janz.digital
                  PAPERLESS_API_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: paperless-mcp-credentials
                        key: apikey
          n8n-pgvector:
            containers:
              n8n-pgvector:
                image:
                  repository: pgvector/pgvector
                  tag: 0.8.1-pg18-trixie
                  pullPolicy: IfNotPresent
                env:
                  POSTGRES_DB: n8n
                  POSTGRES_INITDB_ARGS: '--data-checksums'
                  POSTGRES_USER:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-pgvector-credentials
                        key: user
                  POSTGRES_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-pgvector-credentials
                        key: password
          n8n-qdrant:
            containers:
              n8n-qdrant:
                image:
                  repository: docker.io/qdrant/qdrant
                  tag: v1.17.1
                  pullPolicy: IfNotPresent
                env:
                  QDRANT__LOG_LEVEL: INFO
                  QDRANT__SERVICE__ENABLE_TLS: "0"
                  QDRANT__STORAGE__STORAGE_PATH: /qdrant/data/storage
                  QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/data/snapshots
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__SNAPSHOTS_STORAGE: s3
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__BUCKET: n8n-qdrant
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__REGION: us-east-1
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__ENDPOINT_URL:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-qdrant-credentials
                        key: s3-endpoint-url
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__ACCESS_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-qdrant-credentials
                        key: s3-access-key
                  QDRANT__STORAGE__SNAPSHOTS_CONFIG__S3_CONFIG__SECRET_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-qdrant-credentials
                        key: s3-secret-key
          n8n-tasks:
            containers:
              n8n-tasks:
                image:
                  repository: ghcr.io/pixeljonas/n8n-custom-runner
                  tag: latest
                  pullPolicy: Always
                env:
                  TZ: Europe/Berlin
                  GENERIC_TIMEZONE: Europe/Berlin
                  N8N_RUNNERS_TASK_BROKER_URI: http://n8n-app-n8n-task-broker.n8n.svc.cluster.local:5679
                  N8N_RUNNERS_AUTH_TOKEN:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: runner-auth
          n8n:
            containers:
              n8n:
                image:
                  repository: ghcr.io/n8n-io/n8n
                  tag: 2.18.3
                  pullPolicy: IfNotPresent
                env:
                  TZ: Europe/Berlin
                  GENERIC_TIMEZONE: Europe/Berlin
                  APP_ENV: prod
                  DB_TYPE: postgresdb
                  DB_POSTGRESDB_HOST: n8n-db-rw.n8n.svc.cluster.local
                  DB_POSTGRESDB_PORT: 5432
                  DB_POSTGRESDB_DATABASE: n8n
                  DB_POSTGRESDB_USER: n8n
                  DB_POSTGRESDB_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-db-n8n-secret
                        key: password
                  N8N_HOST:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: host
                  N8N_PORT: 8080
                  NODE_ENV: production
                  WEBHOOK_URL:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: webhookurl
                  N8N_HIRING_BANNER_ENABLED: false
                  N8N_RUNNERS_ENABLED: true
                  N8N_RUNNERS_MODE: external
                  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
                  N8N_RUNNERS_BROKER_PORT: 5679
                  N8N_NATIVE_PYTHON_RUNNER: true
                  N8N_RUNNERS_TASK_TIMEOUT: 36000
                  N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: 36000
                  N8N_RUNNERS_AUTH_TOKEN:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: runner-auth
                  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
                  N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: true
                  N8N_SMTP_SSL: true
                  N8N_SMTP_PORT: 465
                  N8N_SMTP_HOST:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: mailhost
                  N8N_SMTP_SENDER:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: mailfrom
                  N8N_SMTP_USER:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: mailusername
                  N8N_SMTP_PASS:
                    valueFrom:
                      secretKeyRef:
                        name: n8n-credentials
                        key: mailpassword

        persistence:
          home:
            globalMounts:
              - path: /home/node/
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 5Gi
          config:
            globalMounts:
              - path: /.n8n
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 1Gi
          cache:
            globalMounts:
              - path: /.cache
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 5Gi
          npm:
            globalMounts:
              - path: /.npm
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 5Gi
          n8n-pgvector:
            globalMounts:
              - path: /var/lib/postgresql
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 5Gi
          ollama:
            advancedMounts:
              ollama:
                ollama:
                  - path: /.ollama
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 250Gi
          qdrant:
            advancedMounts:
              n8n-qdrant:
                n8n-qdrant:
                  - path: /qdrant/data
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 25Gi
          task-runners-config:
            name: n8n-app-task-runners-config
            enabled: true
            advancedMounts:
              n8n-tasks:
                n8n-tasks:
                  - path: /etc/n8n-task-runners.json
                    subPath: n8n-task-runners.json
            type: secret
            items:
              - key: n8n-task-runners.json
                path: n8n-task-runners.json
          bm25-cache:
            advancedMounts:
              bm25-embed:
                bm25-embed:
                  - path: /cache
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 2Gi
          bm25-app:
            enabled: true
            type: configMap
            name: n8n-app-bm25-app
            advancedMounts:
              bm25-embed:
                bm25-embed:
                  - path: /app
          presidio-cache:
            advancedMounts:
              presidio-api:
                presidio-api:
                  - path: /cache
            storageClass: lvms-vg1
            accessMode: ReadWriteOnce
            size: 2Gi
          presidio-app:
            enabled: true
            type: configMap
            name: n8n-app-presidio-app
            advancedMounts:
              presidio-api:
                presidio-api:
                  - path: /app

        configMaps:
          bm25-app:
            enabled: true
            suffix: bm25-app
            data:
              app.py: |
                import logging
                from threading import Lock, Thread
                from fastapi import FastAPI
                from pydantic import BaseModel
                from fastembed import SparseTextEmbedding

                logger = logging.getLogger("uvicorn.error")

                MODEL_NAME = "Qdrant/bm25"
                _model: SparseTextEmbedding | None = None
                _model_lock = Lock()

                def get_model() -> SparseTextEmbedding:
                    global _model
                    if _model is None:
                        with _model_lock:
                            if _model is None:
                                logger.info("Loading BM25 model %s", MODEL_NAME)
                                _model = SparseTextEmbedding(model_name=MODEL_NAME)
                                logger.info("BM25 model %s ready", MODEL_NAME)
                    return _model

                app = FastAPI()

                @app.on_event("startup")
                def _kick_off_model_load() -> None:
                    # Run in a background thread so uvicorn can start serving
                    # /healthz immediately; the lock in get_model() makes any
                    # concurrent first /embed call wait for this download.
                    Thread(target=get_model, name="bm25-model-loader", daemon=True).start()

                class EmbedRequest(BaseModel):
                    texts: list[str]
                    is_query: bool = False

                class SparseVector(BaseModel):
                    indices: list[int]
                    values: list[float]

                class EmbedResponse(BaseModel):
                    model: str
                    embeddings: list[SparseVector]

                @app.get("/healthz")
                def healthz():
                    return {"ok": True, "model": MODEL_NAME, "loaded": _model is not None}

                @app.post("/embed/bm25", response_model=EmbedResponse)
                def embed_bm25(req: EmbedRequest) -> EmbedResponse:
                    model = get_model()
                    # BM25 in fastembed has separate passage/query methods;
                    # query embeddings omit document-length normalization.
                    iterator = (
                        model.query_embed(req.texts)
                        if req.is_query
                        else model.embed(req.texts)
                    )
                    out = [
                        SparseVector(indices=e.indices.tolist(), values=e.values.tolist())
                        for e in iterator
                    ]
                    return EmbedResponse(model=MODEL_NAME, embeddings=out)
          presidio-app:
            enabled: true
            suffix: presidio-app
            data:
              app.py: |
                from __future__ import annotations
                import os, re
                from contextlib import asynccontextmanager
                from collections import defaultdict
                from fastapi import FastAPI
                from pydantic import BaseModel
                from presidio_analyzer import AnalyzerEngine
                from presidio_analyzer.nlp_engine import NlpEngineProvider

                _analyzer: AnalyzerEngine | None = None

                CATEGORY_PREFIXES = {
                    "PERSON": "PERSON",
                    "EMAIL_ADDRESS": "EMAIL",
                    "PHONE_NUMBER": "PHONE",
                    "LOCATION": "ADDRESS",
                    "IBAN_CODE": "FINANCIAL",
                    "CREDIT_CARD": "FINANCIAL",
                    "IP_ADDRESS": "IP",
                    "URL": "URL",
                    "DATE_TIME": "DATE",
                    "NRP": "NRP",
                    "MEDICAL_LICENSE": "MEDICAL",
                    "US_SSN": "SSN",
                }

                # Read tunables from environment variables
                SCORE_THRESHOLD = float(os.environ.get("PRESIDIO_SCORE_THRESHOLD", "0.7"))
                MIN_ENTITY_LENGTH = int(os.environ.get("PRESIDIO_MIN_ENTITY_LENGTH", "3"))
                FALSE_POSITIVE_DENYLIST = {
                    w.strip().lower()
                    for w in os.environ.get(
                        "PRESIDIO_DENYLIST",
                        "re,cap,von,cc,an,vg,hi,ok,tel,mail,info,gmbh,bcc,fwd,aw,betreff,datum,sitz,best regards"
                    ).split(",")
                    if w.strip()
                }

                @asynccontextmanager
                async def lifespan(app: FastAPI):
                    global _analyzer
                    provider = NlpEngineProvider(nlp_configuration={
                        "nlp_engine_name": "spacy",
                        "models": [
                            {"lang_code": "en", "model_name": "en_core_web_md"},
                            {"lang_code": "de", "model_name": "de_core_news_md"},
                        ],
                    })
                    nlp_engine = provider.create_engine()
                    _analyzer = AnalyzerEngine(
                        nlp_engine=nlp_engine,
                        supported_languages=["en", "de"],
                    )
                    # Warm up
                    _analyzer.analyze(text="Jonas Janz jonas@example.com", language="de")
                    yield

                app = FastAPI(lifespan=lifespan)

                class AnonymizeRequest(BaseModel):
                    text: str
                    language: str = "de"

                class PiiMapping(BaseModel):
                    original: str
                    placeholder: str
                    entity_type: str

                class AnonymizeResponse(BaseModel):
                    sanitized_text: str
                    contains_pii: bool
                    mappings: list[PiiMapping]

                @app.get("/healthz")
                def healthz():
                    return {"ok": _analyzer is not None}

                @app.post("/anonymize", response_model=AnonymizeResponse)
                def anonymize(req: AnonymizeRequest) -> AnonymizeResponse:
                    assert _analyzer is not None
                    results = _analyzer.analyze(
                        text=req.text,
                        language=req.language,
                        score_threshold=SCORE_THRESHOLD,
                    )

                    # Build consistent mapping: same text -> same placeholder
                    entity_counters: dict[str, int] = defaultdict(int)
                    seen: dict[str, str] = {}  # original_text -> placeholder
                    mappings: list[PiiMapping] = []

                    # Sort by position (start) so we process left-to-right
                    results = sorted(results, key=lambda r: r.start)

                    for result in results:
                        original = req.text[result.start:result.end]
                        stripped = original.strip()
                        if not stripped:
                            continue

                        # Skip too-short matches (e.g. "Re", "CC")
                        if len(stripped) < MIN_ENTITY_LENGTH:
                            continue

                        # Normalise for dedup (case-insensitive)
                        norm = stripped.lower()

                        # Skip known false positives
                        if norm in FALSE_POSITIVE_DENYLIST:
                            continue

                        if norm in seen:
                            continue

                        prefix = CATEGORY_PREFIXES.get(result.entity_type, result.entity_type)
                        entity_counters[prefix] += 1
                        placeholder = f"[{prefix}_{entity_counters[prefix]}]"

                        seen[norm] = placeholder
                        mappings.append(PiiMapping(
                            original=original,
                            placeholder=placeholder,
                            entity_type=result.entity_type,
                        ))

                    # Apply replacements longest-first to avoid partial matches
                    sanitized = req.text
                    for m in sorted(mappings, key=lambda x: len(x.original), reverse=True):
                        escaped = re.escape(m.original)
                        sanitized = re.sub(escaped, m.placeholder, sanitized)

                    return AnonymizeResponse(
                        sanitized_text=sanitized,
                        contains_pii=len(mappings) > 0,
                        mappings=mappings,
                    )
        secrets:
          task-runners-config:
            enabled: true
            suffix: task-runners-config
            stringData:
              n8n-task-runners.json: |-
                {
                  "task-runners": [
                    {
                      "runner-type": "javascript",
                      "workdir": "/home/runner",
                      "command": "/usr/local/bin/node",
                      "args": [
                        "--disallow-code-generation-from-strings",
                        "--disable-proto=delete",
                        "/opt/runners/task-runner-javascript/dist/start.js"
                      ],
                      "health-check-server-port": "5681",
                      "allowed-env": [
                        "PATH",
                        "GENERIC_TIMEZONE",
                        "NODE_OPTIONS",
                        "N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT",
                        "N8N_RUNNERS_TASK_TIMEOUT",
                        "N8N_RUNNERS_MAX_CONCURRENCY",
                        "N8N_SENTRY_DSN",
                        "N8N_VERSION",
                        "ENVIRONMENT",
                        "DEPLOYMENT_NAME"
                      ],
                      "env-overrides": {
                        "NODE_FUNCTION_ALLOW_BUILTIN": "*",
                        "NODE_FUNCTION_ALLOW_EXTERNAL": "*",
                        "N8N_RUNNERS_HEALTH_CHECK_SERVER_HOST": "0.0.0.0",
                        "N8N_RUNNERS_TASK_TIMEOUT": "36000"
                      }
                    },
                    {
                      "runner-type": "python",
                      "workdir": "/home/runner",
                      "command": "/opt/runners/task-runner-python/.venv/bin/python",
                      "args": ["-m", "src.main"],
                      "health-check-server-port": "5682",
                      "allowed-env": [
                        "PATH",
                        "N8N_RUNNERS_LAUNCHER_LOG_LEVEL",
                        "N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT",
                        "N8N_RUNNERS_TASK_TIMEOUT",
                        "N8N_RUNNERS_MAX_CONCURRENCY",
                        "N8N_SENTRY_DSN",
                        "N8N_VERSION",
                        "ENVIRONMENT",
                        "DEPLOYMENT_NAME"
                      ],
                      "env-overrides": {
                        "PYTHONPATH": "/opt/runners/task-runner-python",
                        "N8N_RUNNERS_STDLIB_ALLOW": "*",
                        "N8N_RUNNERS_EXTERNAL_ALLOW": "*",
                        "N8N_RUNNERS_TASK_TIMEOUT": "36000"
                      }
                    }
                  ]
                }

        service:
          n8n:
            controller: n8n
            ports:
              http:
                port: 8080
          n8n-task-broker:
            controller: n8n
            ports:
              http:
                port: 5679
          unifi-mcp:
            controller: unifi-mcp
            ports:
              http:
                port: 3000
          paperless-mcp:
            controller: paperless-mcp
            ports:
              http:
                port: 3000
          n8n-pgvector:
            controller: n8n-pgvector
            ports:
              http:
                port: 5432
          ollama:
            controller: ollama
            ports:
              http:
                port: 11434
          qdrant:
            controller: n8n-qdrant
            ports:
              http:
                port: 6333
          bm25-embed:
            controller: bm25-embed
            ports:
              http:
                port: 8000
          presidio-api:
            controller: presidio-api
            ports:
              http:
                port: 8000
                
        ingress:
          n8n:
            enabled: true
            className: openshift-default
            annotations:
              route.openshift.io/termination: "edge"
            hosts:
              - host: n8n.apps.altus.janz.digital
                paths:
                  - path: /
                    service:
                      identifier: n8n
                      port: http

  project: cluster-apps
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

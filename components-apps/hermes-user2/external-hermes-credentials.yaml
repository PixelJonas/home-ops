apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-hermes-credentials
  namespace: hermes-user2
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: hermes-credentials
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: HERMES_USER2_LITELLM_API_KEY
    - secretKey: HONCHO_API_KEY
      remoteRef:
        key: HERMES_USER2_HONCHO_API_KEY
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: HERMES_USER2_API_SERVER_KEY
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
      remoteRef:
        key: HERMES_USER2_DASHBOARD_PASSWORD

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-tax-agent-credentials
  namespace: tax-agent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: tax-agent-credentials
  data:
    - secretKey: PAPERLESS_URL
      remoteRef:
        key: TAXAGENT_PAPERLESS_URL
    - secretKey: PAPERLESS_TOKEN
      remoteRef:
        key: TAXAGENT_PAPERLESS_TOKEN
    - secretKey: LITELLM_BASE_URL
      remoteRef:
        key: TAXAGENT_LITELLM_BASE_URL
    - secretKey: LITELLM_API_KEY
      remoteRef:
        key: TAXAGENT_DOCPIPELINE_LITELLM_KEY

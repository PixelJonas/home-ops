apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tax-agent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tax-agent-allow
  namespace: tax-agent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: paperless}}}]
    - from: [{podSelector: {}}]
    - from: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: cloudnative-pg-operator}}}]
      # CNPG's controller connects into workload pods here (health probes,
      # role/replication management) for the Cluster in this namespace.
  egress:
    - to: [{podSelector: {}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: paperless}}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: litellm}}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: openshift-dns}}}]
      ports: [{port: 53, protocol: UDP}, {port: 53, protocol: TCP}]
    - to: [{ipBlock: {cidr: 172.30.0.1/32}}]
      ports: [{port: 443, protocol: TCP}]
      # Kubernetes API server (kubernetes.default.svc). tax-agent is the only
      # namespace in home-ops with a default-deny NetworkPolicy today, so this
      # is the first time an operator-managed workload here has needed it:
      # CNPG's initdb/bootstrap-controller containers call the API server
      # directly to poll Cluster status, and without this rule that egress
      # times out, wedging Postgres bootstrap indefinitely.

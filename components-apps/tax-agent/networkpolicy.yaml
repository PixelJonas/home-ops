apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: tax-agent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tax-agent-allow
  namespace: tax-agent
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: paperless}}}]
    - from: [{podSelector: {}}]
  egress:
    - to: [{podSelector: {}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: paperless}}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: litellm}}}]
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: openshift-dns}}}]
      ports: [{port: 53, protocol: UDP}, {port: 53, protocol: TCP}]

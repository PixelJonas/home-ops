apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "111"
  name: vllm-app
  namespace: openshift-gitops
spec:
  destination:
    namespace: vllm
    server: "https://kubernetes.default.svc"
  source:
    chart: app-template
    repoURL: https://bjw-s-labs.github.io/helm-charts
    targetRevision: 4.6.2
    helm:
      values: |-

        defaultPodOptions:
          securityContext:
            runAsUser: 0
            runAsGroup: 0

        controllers:
          vllm:
            containers:
              vllm:
                image:
                  repository: vllm/vllm-openai
                  tag: v0.23.0
                  pullPolicy: IfNotPresent
                command:
                  - vllm
                  - serve
                  - BAAI/bge-m3
                  - "--task"
                  - "embed"
                  - "--port"
                  - "8000"
                  - "--gpu-memory-utilization"
                  - "0.8"
                  - "--max-model-len"
                  - "8192"
                  - "--dtype"
                  - "float16"
                  - "--trust-remote-code"
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                  requests:
                    cpu: 500m
                    memory: 4Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 120
                      periodSeconds: 30
                      failureThreshold: 5
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 120
                      periodSeconds: 10
                      failureThreshold: 3

        persistence:
          model-cache:
            enabled: true
            globalMounts:
              - path: /root/.cache/huggingface
            accessMode: ReadWriteOnce
            storageClass: lvms-vg1
            size: 10Gi

        service:
          vllm:
            controller: vllm
            ports:
              http:
                port: 8000

  project: cluster-apps
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-honcho-credentials
  namespace: honcho
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: honcho-credentials
  data:
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: HONCHO_AUTH_JWT_SECRET
    - secretKey: LLM_OPENAI_API_KEY
      remoteRef:
        key: HONCHO_LITELLM_API_KEY

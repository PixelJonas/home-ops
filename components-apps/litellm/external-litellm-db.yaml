apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-db-litellm-secret
  namespace: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster
  target:
    name: litellm-db-litellm-secret
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: "litellm"
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: LITELLM_POSTGRES_USER_PASSWORD

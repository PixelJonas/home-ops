apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "30"
data:
  config.yaml: |
    model_list:
      - model_name: claude-opus-4-6
        litellm_params:
          model: vertex_ai/claude-opus-4-6
          vertex_project: os.environ/VERTEX_PROJECT_ID
          vertex_location: global
          vertex_credentials: os.environ/GOOGLE_APPLICATION_CREDENTIALS

      - model_name: claude-opus-4-6-1m
        litellm_params:
          model: vertex_ai/claude-opus-4-6
          vertex_project: os.environ/VERTEX_PROJECT_ID
          vertex_location: global
          vertex_credentials: os.environ/GOOGLE_APPLICATION_CREDENTIALS
          max_tokens: 128000

      - model_name: claude-sonnet-4-6
        litellm_params:
          model: vertex_ai/claude-sonnet-4-6
          vertex_project: os.environ/VERTEX_PROJECT_ID
          vertex_location: global
          vertex_credentials: os.environ/GOOGLE_APPLICATION_CREDENTIALS

      - model_name: claude-sonnet-4-6-1m
        litellm_params:
          model: vertex_ai/claude-sonnet-4-6
          vertex_project: os.environ/VERTEX_PROJECT_ID
          vertex_location: global
          vertex_credentials: os.environ/GOOGLE_APPLICATION_CREDENTIALS
          max_tokens: 128000

      - model_name: bge-m3
        litellm_params:
          model: openai/BAAI/bge-m3
          api_base: http://vllm-app.vllm.svc:8000/v1
          api_key: unused

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    litellm_settings:
      drop_params: true
      additional_drop_params: ["dimensions"]
      set_verbose: false

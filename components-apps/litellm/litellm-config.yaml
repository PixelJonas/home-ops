apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  annotations:
    argocd.argoproj.io/sync-wave: "30"
data:
  config.yaml: |
    # This deployment runs with STORE_MODEL_IN_DB=true (see litellm-app.yaml),
    # so the live proxy's model registry is whatever is stored in Postgres,
    # managed via the Model Management API (/model/new, /model/update,
    # /model/delete) or the Admin UI's Models page — not this model_list.
    # A model_list here is not loaded into the running proxy; keep this file
    # to the settings blocks below only, to avoid a second, ineffective
    # source of truth for models.
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    litellm_settings:
      drop_params: true
      additional_drop_params: ["dimensions"]
      set_verbose: false
